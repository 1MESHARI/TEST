<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Global Error:', msg, 'at', url, ':', lineNo);
            const loader = document.getElementById('loading-screen');
            if (loader) loader.style.display = 'none';
            return false;
        };
        setTimeout(function() {
            const loader = document.getElementById('loading-screen');
            if (loader && loader.style.display !== 'none') {
                loader.style.display = 'none';
            }
        }, 5000);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Servly | نظام تتبع الطلبات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f43f5e;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; overflow-x: hidden; margin: 0; padding: 0; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(180deg, #0d1b2a 0%, #1a2f4a 50%, #0f1f35 100%); }
        .mesh-circle { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: meshMove 25s infinite ease-in-out; }
        .circle-1 { width: 600px; height: 600px; background: #1e40af; top: -200px; right: -200px; }
        .circle-2 { width: 500px; height: 500px; background: #1e3a8a; bottom: -150px; left: -100px; animation-delay: -8s; }
        @keyframes meshMove { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(20px, 20px) scale(1.02); } 100% { transform: translate(40px, 40px) scale(1.05); } }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white; border-radius: 12px; transition: all 0.3s ease; }
        .sidebar { width: 280px; height: 100vh; position: fixed; right: 0; top: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); z-index: 50; transition: transform 0.3s ease; }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; margin: 4px 12px; border-radius: 12px; color: var(--text-muted); transition: all 0.3s ease; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .nav-item i { width: 24px; margin-left: 12px; font-size: 1.1rem; }
        .main-content { margin-right: 280px; padding: 40px; transition: all 0.3s ease; }
        .order-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; transition: all 0.3s ease; }
        .badge { padding: 4px 12px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1024px) { .sidebar { transform: translateX(100%); } .main-content { margin-right: 0 !important; } }
        .usage-bar-long { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 99px; overflow: hidden; position: relative; }
        .usage-bar-fill { height: 100%; background: var(--primary); transition: width 0.5s ease; }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="mesh-circle circle-1"></div>
        <div class="mesh-circle circle-2"></div>
    </div>

    <div id="app">
        <div id="loading-screen" class="fixed inset-0 z-[100] bg-[#0f172a] flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <h2 class="text-xl font-bold text-white">Servly</h2>
            </div>
        </div>

        <!-- Login Page -->
        <div id="login-page" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="glass-card p-8 lg:p-12 max-w-md mx-auto w-full">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold mb-2">تسجيل الدخول</h2>
                    <p class="text-slate-400">مرحباً بك في Servly</p>
                </div>
                <form id="login-form" class="space-y-6">
                    <input type="email" id="login-email" class="glass-input w-full p-4" placeholder="البريد الإلكتروني" required>
                    <input type="password" id="login-password" class="glass-input w-full p-4" placeholder="كلمة المرور" required>
                    <button type="submit" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all">دخول</button>
                </form>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-dashboard" class="hidden min-h-screen">
            <aside class="sidebar">
                <div class="p-8 text-center">
                    <h1 class="text-2xl font-bold text-indigo-500">Servly Admin</h1>
                </div>
                <nav class="mt-4">
                    <div class="nav-item active" onclick="showAdminSection('admin-stats')"><i class="fas fa-chart-pie"></i><span>الإحصائيات</span></div>
                    <div class="nav-item" onclick="showAdminSection('admin-shops')"><i class="fas fa-store"></i><span>المتاجر</span></div>
                    <div class="mt-auto p-4"><button onclick="logout()" class="nav-item w-full text-rose-400"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button></div>
                </nav>
            </aside>
            <main class="main-content">
                <header class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold">لوحة التحكم المركزية</h2>
                    <button onclick="showModal('add-shop-modal')" class="bg-indigo-600 px-8 py-3 rounded-xl font-bold shadow-lg">إضافة متجر</button>
                </header>
                <div id="admin-sections">
                    <section id="admin-stats-section" class="fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="admin-stats-grid"></div>
                    </section>
                    <section id="admin-shops-section" class="hidden fade-in">
                        <div class="grid gap-6" id="admin-shops-list"></div>
                    </section>
                </div>
            </main>
        </div>

        <!-- Shop Dashboard -->
        <div id="shop-dashboard" class="hidden min-h-screen">
            <aside class="sidebar">
                <div class="p-8 text-center">
                    <div id="shop-logo-container" class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 overflow-hidden">
                        <i id="shop-icon-display" class="fas fa-store text-2xl text-indigo-500"></i>
                    </div>
                    <h1 id="sidebar-shop-name" class="text-xl font-bold text-white">Servly</h1>
                    <p id="shop-plan-display" class="text-xs text-slate-500 mt-1">باقة Basic</p>
                </div>
                <nav class="mt-4">
                    <div class="nav-item active" onclick="showShopSection('current-orders')"><i class="fas fa-list-ul"></i><span>الطلبات</span></div>
                    <div class="nav-item" onclick="showShopSection('stats')"><i class="fas fa-chart-line"></i><span>الإحصائيات</span></div>
                    <div class="nav-item" onclick="showShopSection('settings')"><i class="fas fa-cog"></i><span>الهوية البصرية</span></div>
                    <div id="back-to-admin-btn" class="hidden nav-item text-indigo-400" onclick="backToAdmin()"><i class="fas fa-arrow-right"></i><span>العودة للأدمن</span></div>
                    <div class="mt-auto p-4"><button onclick="logout()" class="nav-item w-full text-rose-400"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button></div>
                </nav>
            </aside>
            <main class="main-content">
                <header class="flex justify-between items-center mb-8">
                    <div class="flex-1 ml-8">
                        <h2 id="shop-name-display" class="text-3xl font-bold">مرحباً</h2>
                        <p id="shop-desc-display" class="text-sm text-slate-400 mt-1">إدارة طلباتك بكل سهولة</p>
                        <div class="mt-4 max-w-md">
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-slate-500">استهلاك الباقة</span>
                                <span id="usage-text-long" class="text-indigo-400 font-bold">0 / 0</span>
                            </div>
                            <div class="usage-bar-long"><div id="usage-bar-fill" class="usage-bar-fill" style="width: 0%"></div></div>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="showModal('qr-modal')" class="glass-card px-6 py-3 flex items-center gap-2"><i class="fas fa-qrcode text-indigo-500"></i><span>تتبع</span></button>
                        <button onclick="checkLimitAndShowModal()" class="bg-indigo-600 px-8 py-3 rounded-xl font-bold shadow-lg">طلب جديد</button>
                    </div>
                </header>
                <div id="shop-sections">
                    <section id="current-orders-section" class="fade-in">
                        <div id="current-orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    </section>
                    <section id="stats-section" class="hidden fade-in">
                        <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                    </section>
                    <section id="settings-section" class="hidden fade-in">
                        <div class="glass-card p-8 max-w-2xl">
                            <h3 class="text-xl font-bold mb-6">تخصيص الهوية البصرية</h3>
                            <form id="settings-form" class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="text" id="set-shop-name" class="glass-input p-3" placeholder="اسم المتجر">
                                    <input type="color" id="set-shop-color" class="glass-input h-12 p-1">
                                </div>
                                <input type="text" id="set-shop-desc" class="glass-input w-full p-3" placeholder="وصف مختصر">
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="text" id="set-shop-logo" class="glass-input p-3" placeholder="رابط الشعار">
                                    <select id="set-shop-icon" class="glass-input p-3 bg-[#1e293b]">
                                        <option value="fa-store">🏪 متجر</option>
                                        <option value="fa-cut">✂️ حلاق</option>
                                        <option value="fa-car">🚗 ورشة</option>
                                        <option value="fa-mobile-alt">📱 صيانة</option>
                                    </select>
                                </div>
                                <button type="submit" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">حفظ</button>
                            </form>
                        </div>
                    </section>
                </div>
            </main>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div id="add-shop-modal" class="hidden glass-card p-8 w-full max-w-md">
                <h3 class="text-2xl font-bold mb-6">إضافة متجر</h3>
                <form id="add-shop-form" class="space-y-4">
                    <input type="text" id="admin-shop-name" class="glass-input w-full p-3" placeholder="اسم المتجر" required>
                    <input type="text" id="admin-shop-uid" class="glass-input w-full p-3" placeholder="UID" required>
                    <select id="admin-shop-type" class="glass-input w-full p-3 bg-[#1e293b]" required>
                        <option value="laundry">🧺 مغسلة</option>
                        <option value="barber">✂️ حلاق</option>
                        <option value="tailor">👔 خياط</option>
                        <option value="workshop">🔧 ورشة</option>
                        <option value="repair">📱 صيانة</option>
                        <option value="services">🖨️ خدمات</option>
                    </select>
                    <select id="admin-shop-plan" class="glass-input w-full p-3 bg-[#1e293b]" required>
                        <option value="basic">Basic (300)</option>
                        <option value="pro">Pro (1000)</option>
                        <option value="business">Business (∞)</option>
                    </select>
                    <div class="flex gap-3 mt-6">
                        <button type="submit" class="flex-1 bg-indigo-600 py-3 rounded-xl font-bold">إنشاء</button>
                        <button type="button" onclick="hideModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold">إلغاء</button>
                    </div>
                </form>
            </div>
            <div id="add-order-modal" class="hidden glass-card p-8 w-full max-w-md">
                <h3 class="text-2xl font-bold mb-6">إضافة طلب</h3>
                <form id="add-order-form" class="space-y-4">
                    <div id="dynamic-fields" class="space-y-4"></div>
                    <div class="flex gap-3 mt-6">
                        <button type="submit" class="flex-1 bg-indigo-600 py-3 rounded-xl font-bold">تأكيد</button>
                        <button type="button" onclick="hideModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold">إلغاء</button>
                    </div>
                </form>
            </div>
            <div id="qr-modal" class="hidden glass-card p-8 w-full max-w-sm text-center">
                <h3 class="text-2xl font-bold mb-6">باركود التتبع</h3>
                <div id="qrcode-container" class="bg-white p-4 rounded-2xl inline-block mb-6"></div>
                <button onclick="hideModal()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD453-ZcJTTYn09u_JwVjR8_nTWP_bogas",
            authDomain: "servlysa.firebaseapp.com",
            databaseURL: "https://servlysa-default-rtdb.firebaseio.com",
            projectId: "servlysa",
            storageBucket: "servlysa.firebasestorage.app",
            messagingSenderId: "816156984476",
            appId: "1:816156984476:web:ba8ac8ee03cb4868215959",
            measurementId: "G-JESY21YY4X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = 'meshari@servly.com';

        const SHOP_TYPES = {
            laundry: { name: 'مغسلة', icon: '🧺', fields: ['customerName', 'customerPhone', 'serviceType', 'price'], labels: { waiting: 'قيد التنفيذ', ready: 'جاهز' } },
            barber: { name: 'حلاق', icon: '✂️', fields: ['customerName', 'customerPhone', 'serviceName', 'bookingTime'], labels: { waiting: 'مؤكد', working: 'تم', ready: 'ملغي' } },
            tailor: { name: 'خياط', icon: '👔', fields: ['customerName', 'customerPhone', 'clothType', 'size', 'notes', 'deliveryDate'], labels: { waiting: 'جاري العمل', ready: 'جاهز', delivered: 'تم التسليم' } },
            workshop: { name: 'ورشة', icon: '🔧', fields: ['customerName', 'customerPhone', 'carType', 'problemDescription'], labels: { waiting: 'تم الاستلام', working: 'جاري الإصلاح', pending: 'بانتظار قطع', ready: 'جاهز' } },
            repair: { name: 'صيانة', icon: '📱', fields: ['customerName', 'customerPhone', 'deviceType', 'problemDescription'], labels: { waiting: 'قيد الفحص', working: 'جاري الإصلاح', ready: 'جاهز' } },
            services: { name: 'خدمات', icon: '🖨️', fields: ['customerName', 'customerPhone', 'serviceType'], labels: { waiting: 'قيد التنفيذ', ready: 'جاهز' } }
        };
        const PLANS = {
            basic: { name: 'Basic', limit: 300 },
            pro: { name: 'Pro', limit: 1000 },
            business: { name: 'Business', limit: 999999 }
        };
        const FIELD_LABELS = {
            customerName: 'اسم العميل', customerPhone: 'رقم الجوال', serviceType: 'نوع الخدمة', price: 'السعر',
            serviceName: 'اسم الخدمة', bookingTime: 'وقت الحجز', clothType: 'نوع الثوب', size: 'المقاس',
            notes: 'ملاحظات', deliveryDate: 'تاريخ التسليم', carType: 'نوع السيارة', problemDescription: 'وصف المشكلة', deviceType: 'نوع الجهاز'
        };

        let state = { user: null, shop: null, orders: [], isAdmin: false, currentShopUid: null };

        window.onload = () => {
            auth.onAuthStateChanged(user => {
                state.user = user;
                document.getElementById('loading-screen').style.display = 'none';
                if (user) {
                    const email = (user.email || "").toLowerCase().trim();
                    if (email === ADMIN_EMAIL.toLowerCase()) {
                        state.isAdmin = true;
                        showPage('admin-dashboard');
                        loadAdminData();
                    } else {
                        state.isAdmin = false;
                        state.currentShopUid = user.uid;
                        loadShopData(user.uid);
                    }
                } else {
                    showPage('login-page');
                }
            });
        };

        function showPage(id) {
            ['login-page', 'admin-dashboard', 'shop-dashboard'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function loadAdminData() {
            db.ref('shops').on('value', snap => {
                const shops = snap.val() || {};
                const shopCount = Object.keys(shops).length;
                let totalUsage = 0;
                Object.values(shops).forEach(s => totalUsage += (s.usage || 0));
                
                document.getElementById('admin-stats-grid').innerHTML = `
                    <div class="glass-card p-6 text-center"><p class="text-slate-400">المتاجر</p><h4 class="text-3xl font-bold">${shopCount}</h4></div>
                    <div class="glass-card p-6 text-center"><p class="text-slate-400">الطلبات</p><h4 class="text-3xl font-bold text-indigo-500">${totalUsage}</h4></div>
                    <div class="glass-card p-6 text-center"><p class="text-slate-400">الحالة</p><h4 class="text-3xl font-bold text-emerald-500">نشط</h4></div>
                `;
                
                const list = document.getElementById('admin-shops-list');
                list.innerHTML = '';
                Object.entries(shops).forEach(([uid, shop]) => {
                    const plan = PLANS[shop.plan || 'basic'];
                    const usage = shop.usage || 0;
                    const percent = Math.min((usage / plan.limit) * 100, 100);
                    const div = document.createElement('div');
                    div.className = 'glass-card p-6';
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-xl font-bold">${shop.name} <span class="text-sm font-normal text-slate-500">(${SHOP_TYPES[shop.type]?.name})</span></h3>
                                <p class="text-sm text-slate-400">الباقة: ${plan.name}</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="resetUsage('${uid}')" class="px-4 py-2 bg-emerald-500/10 text-emerald-500 rounded-lg text-sm">تصفير</button>
                                <button onclick="loginAsShop('${uid}')" class="px-6 py-2 bg-indigo-600 rounded-xl font-bold">دخول</button>
                            </div>
                        </div>
                        <div class="usage-bar-long"><div class="usage-bar-fill" style="width: ${percent}%; background-color: ${shop.color || 'var(--primary)'}"></div></div>
                        <p class="text-[10px] text-slate-500 mt-1">الاستخدام: ${usage} / ${plan.limit === 999999 ? '∞' : plan.limit}</p>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function loadShopData(uid) {
            state.currentShopUid = uid;
            db.ref(`shops/${uid}`).on('value', snap => {
                state.shop = snap.val();
                if (state.shop) {
                    document.getElementById('shop-name-display').innerText = `مرحباً، ${state.shop.name}`;
                    document.getElementById('sidebar-shop-name').innerText = state.shop.name;
                    document.getElementById('shop-desc-display').innerText = state.shop.description || 'إدارة طلباتك بكل سهولة';
                    document.getElementById('shop-plan-display').innerText = `باقة ${PLANS[state.shop.plan || 'basic'].name}`;
                    if (state.isAdmin) {
                        document.getElementById('back-to-admin-btn').classList.remove('hidden');
                    } else {
                        document.getElementById('back-to-admin-btn').classList.add('hidden');
                    }
                    updateUsageUI();
                    applyShopTheme(state.shop);
                    showPage('shop-dashboard');
                    loadOrders(uid);
                }
            });
        }

        function updateUsageUI() {
            const plan = PLANS[state.shop.plan || 'basic'];
            const usage = state.shop.usage || 0;
            const percent = Math.min((usage / plan.limit) * 100, 100);
            document.getElementById('usage-bar-fill').style.width = `${percent}%`;
            document.getElementById('usage-text-long').innerText = `${usage} / ${plan.limit === 999999 ? '∞' : plan.limit}`;
        }

        function loadOrders(uid) {
            db.ref(`orders/${uid}`).on('value', snap => {
                const data = snap.val();
                state.orders = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
                renderOrders();
                renderStats();
            });
        }

        function renderOrders() {
            const grid = document.getElementById('current-orders-grid');
            grid.innerHTML = '';
            const type = SHOP_TYPES[state.shop.type || 'services'];
            state.orders.filter(o => o.status !== 'delivered').forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card fade-in';
                let fieldsHtml = '';
                type.fields.forEach(f => { if(order[f]) fieldsHtml += `<p class="text-sm text-slate-400">${FIELD_LABELS[f]}: ${order[f]}</p>`; });
                let buttonsHtml = '';
                Object.entries(type.labels).forEach(([key, label]) => {
                    buttonsHtml += `<button onclick="updateStatus('${order.id}', '${key}')" class="flex-1 p-2 rounded-lg bg-white/5 text-xs hover:bg-white/10">${label}</button>`;
                });
                buttonsHtml += `<button onclick="updateStatus('${order.id}', 'delivered')" class="flex-1 p-2 rounded-lg bg-emerald-500/10 text-emerald-500 text-xs">تم</button>`;
                card.innerHTML = `<div class="flex justify-between mb-4"><span class="text-xs text-indigo-400">#${order.orderId || '000'}</span><span class="badge" style="background-color: ${state.shop.color || 'var(--primary)'}1A; color: ${state.shop.color || 'var(--primary)'}">${type.labels[order.status] || order.status}</span></div><div class="mb-6 space-y-1">${fieldsHtml}</div><div class="flex gap-2 flex-wrap">${buttonsHtml}</div>`;
                grid.appendChild(card);
            });
        }

        function applyShopTheme(shop) {
            const color = shop.color || '#6366f1';
            document.documentElement.style.setProperty('--primary', color);
            document.getElementById('shop-icon-display').className = `fas ${shop.icon || 'fa-store'} text-2xl`;
            document.getElementById('shop-icon-display').style.color = color;
            if (shop.logo) {
                document.getElementById('shop-logo-container').innerHTML = `<img src="${shop.logo}" class="w-full h-full object-cover">`;
            } else {
                document.getElementById('shop-logo-container').innerHTML = `<i id="shop-icon-display" class="fas ${shop.icon || 'fa-store'} text-2xl" style="color: ${color}"></i>`;
            }
            document.getElementById('set-shop-name').value = shop.name || '';
            document.getElementById('set-shop-color').value = color;
            document.getElementById('set-shop-desc').value = shop.description || '';
            document.getElementById('set-shop-logo').value = shop.logo || '';
            document.getElementById('set-shop-icon').value = shop.icon || 'fa-store';
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try { await auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-password').value); } catch (err) { alert('خطأ: ' + err.message); }
        };

        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            await db.ref(`shops/${state.currentShopUid}`).update({
                name: document.getElementById('set-shop-name').value,
                color: document.getElementById('set-shop-color').value,
                description: document.getElementById('set-shop-desc').value,
                logo: document.getElementById('set-shop-logo').value,
                icon: document.getElementById('set-shop-icon').value
            });
            alert('تم الحفظ');
        };

        document.getElementById('add-shop-form').onsubmit = async (e) => {
            e.preventDefault();
            const uid = document.getElementById('admin-shop-uid').value;
            await db.ref(`shops/${uid}`).set({
                name: document.getElementById('admin-shop-name').value,
                type: document.getElementById('admin-shop-type').value,
                plan: document.getElementById('admin-shop-plan').value, usage: 0, status: 'active'
            });
            hideModal();
        };

        document.getElementById('add-order-form').onsubmit = async (e) => {
            e.preventDefault();
            const type = SHOP_TYPES[state.shop.type || 'services'];
            const order = { status: 'waiting', timestamp: Date.now(), orderId: Math.floor(1000 + Math.random() * 9000) };
            type.fields.forEach(f => { order[f] = document.getElementById(`field-${f}`).value; });
            await db.ref(`orders/${state.currentShopUid}`).push(order);
            await db.ref(`shops/${state.currentShopUid}/usage`).set((state.shop.usage || 0) + 1);
            hideModal();
        };

        function showAdminSection(id) {
            ['admin-stats', 'admin-shops'].forEach(s => document.getElementById(`${s}-section`).classList.add('hidden'));
            document.getElementById(`${id}-section`).classList.remove('hidden');
            document.querySelectorAll('#admin-dashboard .nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        function showShopSection(id) {
            ['current-orders', 'stats', 'settings'].forEach(s => document.getElementById(`${s}-section`).classList.add('hidden'));
            document.getElementById(`${id}-section`).classList.remove('hidden');
            document.querySelectorAll('#shop-dashboard .nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        function backToAdmin() { showPage('admin-dashboard'); }
        function logout() { auth.signOut().then(() => location.reload()); }
        function showModal(id) { document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById(id).classList.remove('hidden'); if(id==='qr-modal') generateQRCode(); }
        function hideModal() { document.getElementById('modal-overlay').classList.add('hidden'); document.querySelectorAll('#modal-overlay > div').forEach(d => d.classList.add('hidden')); }
        function updateStatus(id, status) { db.ref(`orders/${state.currentShopUid}/${id}`).update({ status }); }
        async function resetUsage(uid) { await db.ref(`shops/${uid}/usage`).set(0); }
        function loginAsShop(uid) { loadShopData(uid); }
        function checkLimitAndShowModal() {
            const plan = PLANS[state.shop.plan || 'basic'];
            if ((state.shop.usage || 0) >= plan.limit) { alert('انتهى اشتراكك'); return; }
            showModal('add-order-modal');
            renderDynamicFields();
        }
        function renderDynamicFields() {
            const container = document.getElementById('dynamic-fields');
            container.innerHTML = '';
            const type = SHOP_TYPES[state.shop.type || 'services'];
            type.fields.forEach(f => {
                const input = document.createElement('input');
                input.id = `field-${f}`;
                input.className = 'glass-input w-full p-3';
                input.placeholder = FIELD_LABELS[f];
                input.required = true;
                container.appendChild(input);
            });
        }
        function renderStats() {
            const income = state.orders.reduce((acc, o) => acc + (parseFloat(o.price) || 0), 0);
            document.getElementById('stats-grid').innerHTML = `
                <div class="glass-card p-6 text-center"><p class="text-slate-400">الطلبات</p><h4 class="text-2xl font-bold">${state.orders.length}</h4></div>
                <div class="glass-card p-6 text-center"><p class="text-slate-400">نشطة</p><h4 class="text-2xl font-bold">${state.orders.filter(o => o.status !== 'delivered').length}</h4></div>
                <div class="glass-card p-6 text-center"><p class="text-slate-400">المبيعات</p><h4 class="text-2xl font-bold text-emerald-500">${income} ر.س</h4></div>
            `;
        }
        function generateQRCode() {
            const container = document.getElementById('qrcode-container');
            container.innerHTML = '';
            new QRCode(container, { text: `${window.location.origin}${window.location.pathname}#page=track&shopId=${state.currentShopUid}`, width: 200, height: 200, colorDark: "#0f172a" });
        }
    </script>
</body>
</html>
